name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Ruff, pytest, and smoke checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --locked --group dev

      - name: Run ruff
        run: uv run --frozen ruff check .

      - name: Run pytest
        run: uv run --frozen pytest

      - name: Run namespace doctor
        run: uv run --frozen restless-gambler doctor namespace

      - name: Build package
        run: uv build --out-dir "$RUNNER_TEMP/dist"

      - name: Smoke test fixture paper run
        run: |
          uv run --frozen restless-gambler run \
            --mode paper \
            --as-of 2026-05-31 \
            --artifacts-dir "$RUNNER_TEMP/restless-gambler-runs"
